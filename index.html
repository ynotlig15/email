```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de E-mails</title>

<style>
body {
    background-color: #121212;
    color: #f0f0f0;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
}

input, button {
    padding: 10px;
    margin: 10px;
    border: none;
    border-radius: 5px;
}

input {
    width: 300px;
}

button {
    background-color: #333;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #555;
}

.resultado {
    margin-top: 20px;
    text-align: left;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
}

.email {
    background: #1e1e1e;
    padding: 8px;
    margin: 5px 0;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.email.copiado {
    background-color: #143814;
    border: 2px solid #00ff00;
}

.copy-btn {
    background-color: #444;
    color: white;
    padding: 5px 10px;
}

.copy-btn:hover {
    background-color: #666;
}

#contador {
    font-weight: bold;
    margin-top: 15px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<h1>Gerador de E-mails com Pontos</h1>

<input type="text" id="email" placeholder="Digite seu e-mail">

<br>

<button onclick="gerar()">Gerar Combinações</button>
<button onclick="baixar()">Baixar TXT</button>
<button onclick="limparCopiados()">Limpar Marcados</button>

<p id="contador"></p>

<div class="resultado" id="resultado"></div>

<script>

let combinacoes = [];
let copiados = JSON.parse(localStorage.getItem("emailsCopiados")) || [];

function gerar() {

    const email = document.getElementById("email").value.trim();

    const resultado = document.getElementById("resultado");
    const contador = document.getElementById("contador");

    resultado.innerHTML = "";
    contador.innerHTML = "";

    combinacoes = [];

    if (!email.includes("@")) {
        resultado.innerHTML = "<p>Digite um e-mail válido.</p>";
        return;
    }

    const [usuario, dominio] = email.split("@");

    function backtrack(prefixo, i) {

        if (i === usuario.length) {
            combinacoes.push(prefixo + "@" + dominio);
            return;
        }

        backtrack(prefixo + usuario[i], i + 1);

        if (i > 0) {
            backtrack(prefixo + "." + usuario[i], i + 1);
        }
    }

    backtrack("", 0);

    contador.textContent =
        "Total de combinações possíveis: " +
        combinacoes.length;

    combinacoes.forEach(c => {

        const div = document.createElement("div");
        div.className = "email";

        const span = document.createElement("span");
        span.textContent = c;

        const btn = document.createElement("button");
        btn.className = "copy-btn";

        if (copiados.includes(c)) {
            div.classList.add("copiado");
            btn.textContent = "Já Copiado";
        } else {
            btn.textContent = "Copiar";
        }

        btn.onclick = () => {

            navigator.clipboard.writeText(c);

            if (!copiados.includes(c)) {

                copiados.push(c);

                localStorage.setItem(
                    "emailsCopiados",
                    JSON.stringify(copiados)
                );

                div.classList.add("copiado");
            }

            btn.textContent = "Já Copiado";
        };

        div.appendChild(span);
        div.appendChild(btn);

        resultado.appendChild(div);
    });
}

function baixar() {

    if (combinacoes.length === 0) {
        alert("Primeiro gere as combinações!");
        return;
    }

    const blob = new Blob(
        [combinacoes.join("\n")],
        { type: "text/plain" }
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "emails.txt";

    link.click();
}

function limparCopiados() {

    if (!confirm("Deseja apagar todos os e-mails marcados?")) {
        return;
    }

    localStorage.removeItem("emailsCopiados");

    copiados = [];

    gerar();
}

</script>

</body>
</html>
