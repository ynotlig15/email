```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de E-mails com Controle</title>

<style>
body{
    background:#121212;
    color:#f0f0f0;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

input,button{
    padding:10px;
    margin:10px;
    border:none;
    border-radius:5px;
}

input{
    width:320px;
}

button{
    background:#333;
    color:#fff;
    cursor:pointer;
}

button:hover{
    background:#555;
}

#contador{
    font-weight:bold;
    margin:15px 0;
}

.resultado{
    max-width:800px;
    margin:auto;
    text-align:left;
}

.email{
    background:#1e1e1e;
    margin:6px 0;
    padding:10px;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.email-info{
    line-height:1.5;
}

.email.copiado{
    background:#143814;
    border:2px solid #00ff00;
}

.copy-btn{
    min-width:110px;
}
</style>
</head>
<body>

<h1>Gerador de E-mails com Pontos</h1>

<input type="text" id="email" placeholder="Digite seu e-mail">

<br>

<button onclick="gerar()">Gerar Combinações</button>
<button onclick="baixar()">Baixar TXT</button>
<button onclick="limparCopiados()">Limpar Marcados</button>

<p id="contador"></p>

<div id="resultado" class="resultado"></div>

<script>

let combinacoes = [];
let copiados = JSON.parse(localStorage.getItem("emailsCopiados")) || [];

function atualizarContador() {
    document.getElementById("contador").textContent =
        `Total: ${combinacoes.length} | Copiados: ${copiados.length}`;
}

function gerar() {

    const email = document.getElementById("email").value.trim();
    const resultado = document.getElementById("resultado");

    resultado.innerHTML = "";
    combinacoes = [];

    if (!email.includes("@")) {
        resultado.innerHTML = "<p>Digite um e-mail válido.</p>";
        document.getElementById("contador").textContent = "";
        return;
    }

    const [usuario, dominio] = email.split("@");

    function backtrack(prefixo, i) {

        if (i === usuario.length) {
            combinacoes.push(prefixo + "@" + dominio);
            return;
        }

        backtrack(prefixo + usuario[i], i + 1);

        if (i > 0) {
            backtrack(prefixo + "." + usuario[i], i + 1);
        }
    }

    backtrack("", 0);

    atualizarContador();

    combinacoes.forEach((c, index) => {

        const div = document.createElement("div");
        div.className = "email";

        const info = document.createElement("div");
        info.className = "email-info";

        info.innerHTML = `
            <strong>#${index + 1}</strong> - ${c}
            <br>
            <small>Posição: ${index + 1} de ${combinacoes.length}</small>
        `;

        const btn = document.createElement("button");
        btn.className = "copy-btn";

        if (copiados.includes(c)) {
            div.classList.add("copiado");
            btn.textContent = "Já Copiado";
        } else {
            btn.textContent = "Copiar";
        }

        btn.onclick = () => {

            navigator.clipboard.writeText(c);

            if (!copiados.includes(c)) {

                copiados.push(c);

                localStorage.setItem(
                    "emailsCopiados",
                    JSON.stringify(copiados)
                );

                div.classList.add("copiado");
                atualizarContador();
            }

            btn.textContent = "Já Copiado";
        };

        div.appendChild(info);
        div.appendChild(btn);

        resultado.appendChild(div);
    });
}

function baixar() {

    if (combinacoes.length === 0) {
        alert("Primeiro gere as combinações!");
        return;
    }

    const blob = new Blob(
        [combinacoes.join("\n")],
        {type:"text/plain"}
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "emails.txt";

    link.click();
}

function limparCopiados() {

    if (!confirm("Deseja apagar todos os e-mails marcados?")) {
        return;
    }

    localStorage.removeItem("emailsCopiados");
    copiados = [];

    gerar();
}

</script>

</body>
</html>
