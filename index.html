<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de E-mails</title>
  <style>
    body {
      background-color: #121212;
      color: #f0f0f0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 5px;
    }
    input {
      width: 300px;
    }
    button {
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    .resultado {
      margin-top: 20px;
      text-align: left;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .email {
      background: #1e1e1e;
      padding: 5px;
      margin: 3px 0;
      border-radius: 3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .copy-btn {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
    }
    .copy-btn:hover {
      background-color: #666;
    }
    #contador {
      font-weight: bold;
      margin-top: 15px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <h1>Gerador de E-mails com Pontos</h1>
  <input type="text" id="email" placeholder="Digite seu e-mail">
  <button onclick="gerar()">Gerar Combinações</button>
  <button onclick="baixar()">Baixar TXT</button>

  <p id="contador"></p>
  <div class="resultado" id="resultado"></div>

  <script>
    let combinacoes = [];

    function gerar() {
      const email = document.getElementById("email").value.trim();
      const resultado = document.getElementById("resultado");
      const contador = document.getElementById("contador");
      resultado.innerHTML = "";
      contador.innerHTML = "";
      combinacoes = [];

      if (!email.includes("@")) {
        resultado.innerHTML = "<p>Digite um e-mail válido.</p>";
        return;
      }

      const [usuario, dominio] = email.split("@");

      function backtrack(prefixo, i) {
        if (i === usuario.length) {
          combinacoes.push(prefixo + "@" + dominio);
          return;
        }
        backtrack(prefixo + usuario[i], i + 1); // sem ponto
        if (i > 0) backtrack(prefixo + "." + usuario[i], i + 1); // com ponto
      }

      backtrack("", 0);

      contador.textContent = "Total de combinações possíveis: " + combinacoes.length;

      combinacoes.forEach(c => {
        const div = document.createElement("div");
        div.className = "email";

        const span = document.createElement("span");
        span.textContent = c;

        const btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.textContent = "Copiar";
        btn.onclick = () => {
          navigator.clipboard.writeText(c);
          btn.textContent = "Copiado!";
          setTimeout(() => btn.textContent = "Copiar", 1500);
        };

        div.appendChild(span);
        div.appendChild(btn);
        resultado.appendChild(div);
      });
    }

    function baixar() {
      if (combinacoes.length === 0) {
        alert("Primeiro gere as combinações!");
        return;
      }
      const blob = new Blob([combinacoes.join("\n")], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "emails.txt";
      link.click();
    }
  </script>
</body>
</html>
